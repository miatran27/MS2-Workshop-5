<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Hotspots</title>
  <!--
    HOW TO RUN:
    Option 1: Open this file directly in a browser (double-click index.html).
    Option 2: From this folder in a terminal, run: python3 -m http.server 8000
              Then open http://localhost:8000 in your browser.
  -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Fallback so something shows even if styles.css fails to load */
    html, body { margin: 0; height: 100%; overflow: hidden; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #e5e7eb; }
    .overlay { position: fixed; top: 0; left: 0; z-index: 1000; padding: 12px 16px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="overlay">
    <h1>NYC Hotspots</h1>
    <p class="hint">Hover to see pulse • Click to play audio</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
